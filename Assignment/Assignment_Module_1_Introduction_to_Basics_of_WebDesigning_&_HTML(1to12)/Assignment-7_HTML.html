<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPortfolio</title>
    <!--
    Objective: Practice building a basic navigation bar.
 Instructions:
 1. Createan HTML page with a title “MyPortfolio.”
 2. Inside the <body>, create a navigation bar at the top with the following links:
 o Home
 o AboutMe
 o Portfolio
 o Contact
 3. Use an unordered list (<ul>) to create the navigation bar, and style it with inline CSS to
 display the links horizontally.
    -->
</head>
<body>
        <ul>
            <li style="text-decoration:none;"><a href="#Home">Home</a></li>
            <li>AboutMe</li>
            <li>Portfolio</li>
            <li>Contact</li>
        </ul> 
</body>
</html>
